name: App CI

on:
  pull_request:
  push:
    branches:
    - main
  workflow_dispatch:


permissions:
  contents: read

env:
  NODE_VERSION: '25'
  APP_NAME: container-app
  COVERAGE_THRESHOLD_PCT: '60'

jobs:
  bootstrap-local-ci:
    runs-on: ubuntu-latest
    outputs:
      coverage_pct: ${{ steps.proxy_inputs.outputs.coverage_pct }}
      coverage_threshold_pct: ${{ steps.proxy_inputs.outputs.coverage_threshold_pct }}
      subject_digest: ${{ steps.proxy_inputs.outputs.subject_digest }}
      subject_name: ${{ steps.proxy_inputs.outputs.subject_name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci --no-fund --no-audit

    - name: Type-check
      run: npm run check

    - name: Run tests with coverage gate
      run: npm test
      env:
        COVERAGE_THRESHOLD_PCT: ${{ env.COVERAGE_THRESHOLD_PCT }}

    - name: Generate local SBOM
      run: npm run sbom

    - name: Generate evidence payload
      run: npm run generate:evidence
      env:
        APP_NAME: ${{ env.APP_NAME }}
        ENVIRONMENT: ci
        GIT_SHA: ${{ github.sha }}
        IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/container-app
        IMAGE_TAG: ${{ github.sha }}
        GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        RULESET_IDS: bootstrap-local-ci
        COVERAGE_THRESHOLD_PCT: ${{ env.COVERAGE_THRESHOLD_PCT }}

    - name: Prepare Proxy-Hub workflow inputs
      id: proxy_inputs
      shell: bash
      run: |
        coverage_pct="$(node -e "const fs=require('fs'); const evidence=JSON.parse(fs.readFileSync('artifacts/attestation-evidence.json','utf8')); process.stdout.write(String(evidence.coverage_pct));")"
        subject_name="ghcr.io/${{ github.repository_owner }}/container-app"
        subject_digest="sha256:$(printf '%s' "${GITHUB_SHA}" | sha256sum | awk '{print $1}')"

        echo "coverage_pct=$coverage_pct" >> "$GITHUB_OUTPUT"
        echo "coverage_threshold_pct=${{ env.COVERAGE_THRESHOLD_PCT }}" >> "$GITHUB_OUTPUT"
        echo "subject_name=$subject_name" >> "$GITHUB_OUTPUT"
        echo "subject_digest=$subject_digest" >> "$GITHUB_OUTPUT"

    - name: Build container image
      run: |
        APP_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
        BUILD_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        docker build \
          --build-arg APP_VERSION="${APP_VERSION}" \
          --build-arg GIT_SHA="${GITHUB_SHA}" \
          --build-arg BUILD_TIMESTAMP="${BUILD_TIMESTAMP}" \
          --tag container-app:${GITHUB_SHA} \
          .

    - name: Upload evidence artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: container-app-evidence-${{ github.run_id }}
        path: |
          coverage/**
          reports/**
          artifacts/**

  proxy-secret-scan:
    name: Proxy-Hub Secret Scan
    uses: fin-spoke-poc/Proxy-Hub/.github/workflows/secops-secret-scan-proxy.yml@main
    with:
      artifact_name: proxy-secret-scan-report
      fail_on_findings: true
      test_mode: true

  proxy-container-scan:
    name: Proxy-Hub Container Scan
    uses: fin-spoke-poc/Proxy-Hub/.github/workflows/secops-container-scan-proxy.yml@main
    with:
      artifact_name: proxy-container-scan-report
      fail_on_findings: true
      ignore_unfixed: true
      scan_target: .
      scan_type: filesystem
      severity: HIGH,CRITICAL
      test_mode: true

  proxy-attest-sign:
    name: Proxy-Hub Attest And Sign
    needs:
    - bootstrap-local-ci
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: fin-spoke-poc/Proxy-Hub/.github/workflows/secops-attest-sign-proxy.yml@main
    with:
      artifact_name: proxy-attest-sign-report
      coverage_pct: ${{ fromJSON(needs.bootstrap-local-ci.outputs.coverage_pct) }}
      coverage_threshold_pct: ${{ fromJSON(needs.bootstrap-local-ci.outputs.coverage_threshold_pct) }}
      enable_signing: false
      subject_digest: ${{ needs.bootstrap-local-ci.outputs.subject_digest }}
      subject_name: ${{ needs.bootstrap-local-ci.outputs.subject_name }}
      test_mode: true
